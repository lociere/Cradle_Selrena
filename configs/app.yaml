# ╔════════════════════════════════════════════════════════════╗
# ║  Cradle Selrena — 应用配置 (app.yaml)                    ║
# ╚════════════════════════════════════════════════════════════╝

# 应用显示名称
app_name: "Cradle Selrena"

# 语义化版本号（仅展示，不影响运行行为）
app_version: "0.1.0"

# 全局日志级别：debug | info | warn | error
log_level: "debug"

# ── 目录路径（均相对于项目根目录） ────────────────────────────

# 持久化数据目录（数据库、记忆等）
data_dir: "data"

# 日志输出目录
log_dir: "logs"

# 自动备份存放目录
backup_dir: "data/backup"

# 自动备份间隔（小时），0 = 不备份
auto_backup_interval_hours: 24
