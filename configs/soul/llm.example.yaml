# ==============================================================================
# Cradle Selrena - Soul Configuration (Brain & Cognition)
# ==============================================================================
# Example Configuration of your LLM providers.
# Copy this file to `llm.yaml` and fill in your actual settings.
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. Brain Strategy (大脑指挥部)
# ------------------------------------------------------------------------------
strategy:
  # === 模式选择 (Routing Mode) ===
  # - 'split_tasks': 专家分工 (推荐)。视觉任务先交给视觉专家(vision)，再转述给大脑(core_provider)。
  # - 'single_multimodal': 全能单体。所有任务直接交给大脑(core_provider)。
  routing_mode: split_tasks

  # === 核心大脑 (The Thinking Brain) ===
  # 无论何种模式，最终负责逻辑推理和对话生成的模型 ID。
  core_provider: local_embedded

  # === 感知专家 (The Senses) - 仅 split_tasks 生效 ===
  # 将特定感知任务委派给最擅长的模型。如果未配置，将尝试让核心大脑直接处理。
  module_map:
    vision: qwen                # 视觉专家 (The Eyes): 负责看图并生成描述
    # audio: whisper            # (Future) 听觉专家

  # === 容灾 ===
  # 当云端服务不可用时，是否自动降级到本地模型
  fallback_to_local: true


# ------------------------------------------------------------------------------
# 2. Providers Registry (模型仓库) - 定义可用的 AI 模型
# ------------------------------------------------------------------------------
providers:

  # --- [Local] 本地内嵌 Gemma (主力思考模型) ---
  local_embedded:
    provider: local_embedded
    # 模型路径 (GGUF 格式), 必须修改
    local_model_path: "D:/elise/Cradle_Selrena/assets/models/gemma-3-4b-it-Q5_K_M.gguf"
    
    # [Local Vision] 本地视觉投影器 (可选)
    local_clip_model_path: "" 

    # 性能参数
    n_gpu_layers: -1      # -1 = All layers on GPU
    n_ctx: 8192           # Context Window
    n_batch: 512          # Prompt Processing Batch Size
    flash_attn: false     # Enable Flash Attention (Requires specific build)
    
    # 自动下载 (False for local GGUF)
    auto_download: false

  # --- [Cloud] Qwen (Example Vision Provider) ---
  qwen:
    provider: openai
    api_key: "YOUR_API_KEY_HERE"  # 请替换为对应平台的 API Key
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen-vl-plus"
    api_mode: "chat"
    temperature: 0.7
    max_tokens: 2048

  # --- [Cloud] DeepSeek (Example Core Provider) ---
  deepseek:
    provider: openai
    api_key: "YOUR_API_KEY_HERE"
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"
    api_mode: "chat"
    temperature: 0.7
    max_tokens: 4096
