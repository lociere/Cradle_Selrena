# AI 推理配置（供 Python AI 层使用）
# 该文件应仅包含推理管道相关参数：模型参数、生命时钟、记忆规则等。
# 人设（persona）配置请保持在 configs/oc/persona.yaml 中。

inference:
  model:
    local_model_path: "assets/models/llama-7b.bin"
    max_tokens: 1024
    temperature: 0.8
    top_p: 0.9
    frequency_penalty: 0.0
  life_clock:
    focused_interval_ms: 10000
    ambient_interval_ms: 45000
    default_mode: "standby"
    focus_duration_ms: 15000
    ingress_debounce_ms: 1400
    ingress_focused_debounce_ms: 700
    ingress_max_batch_messages: 4
    ingress_max_batch_items: 24
    summon_keywords: ["月见", "selrena", "小月见"]
    focus_on_any_chat: false
    active_thought_modes: []
    source_focus_policies:
      private: "always_focused"
      group: "wake_word_focus_with_timeout"
      channel: "wake_word_focus_with_timeout"
      terminal: "chat_or_wake_focus_with_timeout"
      system: "ignore"
      unknown: "chat_or_wake_focus_with_timeout"
  memory:
    max_recall_count: 5
    retention_days: 30
    context_limit: 6
    conversation_window: 12
    summary_trigger_count: 18
    summary_keep_recent_count: 6
    summary_max_chars: 2400
  multimodal:
    enabled: true
    strategy: "specialist_then_core"
    max_items: 6
    core_model: "deepseek"
    image_model: "qwen3.5plus"
    video_model: "qwen3.5plus"
  action_stream:
    enabled: true
    channel: "live2d"
    chunk_interval_ms: 80
    max_chunks_per_stream: 120
    emit_thinking_chunks: true
    emit_emotion_on_complete: true
