# AI 推理配置（供 Python AI 层使用）
# 该文件应仅包含推理管道相关参数：模型参数、生命时钟、记忆规则等。
# 人设（persona）配置请保持在 configs/oc/persona.yaml 中。

inference:
  model:
    local_model_path: "assets/models/llama-7b.bin"
    max_tokens: 1024
    temperature: 0.8
    top_p: 0.9
    frequency_penalty: 0.0
  life_clock:
    focused_interval_ms: 10000
    ambient_interval_ms: 45000
    default_mode: "standby"
    focus_duration_ms: 180000
    summon_keywords: ["月见", "selrena", "小月见"]
    focus_on_any_chat: false
    active_thought_modes: []
  memory:
    max_recall_count: 5
    retention_days: 30
    context_limit: 5
  multimodal:
    enabled: true
    strategy: "specialist_then_core"
    max_items: 6
    core_model: "qwen-vl-core"
    image_model: "qwen-image-specialist"
    video_model: "qwen-video-specialist"
