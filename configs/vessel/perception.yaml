audio:
  enabled: false
  sample_rate: 16000
  chunk_size: 1024
  device_index: null
  asr:
    enabled: true
    model_dir: iic/SenseVoiceSmall
    device: cuda
    quantize: true
    use_itn: true
vision:
  enabled: true
  capture_interval: 5.0
accepted_modalities:
  - text
  - visual
strict_wake_word: true
wake_timeout_sec: 30.0
non_text_chain_timeout_sec: 30.0
