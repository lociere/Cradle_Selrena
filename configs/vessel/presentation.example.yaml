# Presentation Config Example
# Copy to presentation.yaml
tts:
  enabled: true
  engine: edge-tts
  api_url: http://127.0.0.1:9880
  character_map_path: ./configs/voice_presets.json
  output_dir: ./runtime/tts
  auto_play: true
  save_audio: true
  audio_format: wav
  voice: zh-CN-XiaoxiaoNeural
  rate: +0%
  volume: +0%
  pitch: +0Hz
vts:
  enabled: false
  host: 127.0.0.1
  port: 8001
